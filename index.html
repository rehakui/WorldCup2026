.count{font-size:12px;color:var(--text-sub);margin-bottom:10px}
.stage-title{font-size:17px;font-weight:600;margin:18px 0 6px}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 13px;margin-bottom:8px}
.card.japan{border:2px solid var(--accent-text)}
.row1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.time{font-size:15px;font-weight:600}
.venue{font-size:11px;color:var(--text-sub)}
.teams{font-size:15px;margin-bottom:7px}
.teams .vs{color:var(--text-sub);font-size:12px;margin:0 5px}
.badges{display:flex;flex-wrap:wrap;gap:5px}
.badge{font-size:11px;padding:3px 8px;border-radius:7px;font-weight:600;white-space:nowrap}
.b-nhk{background:var(--b-nhk-bg);color:var(--b-nhk-text)}

.note{font-size:11px;color:var(--text-sub);margin-top:18px;padding-top:12px;border-top:1px solid var(--border)}

  if(b==="NHK")return"b-nhk";
  if(b==="NHK BS"||b==="BSP4K")return"b-bs";
  if(b==="日本テレビ")return"b-ntv";
  if(b==="フジテレビ")return"b-fuji";
  return"b-dazn";
}

  const noRes=document.getElementById("noResults");
  document.getElementById("count").textContent=filtered.length+"試合";
  if(filtered.length===0){list.innerHTML="";noRes.style.display="block";return;}
  noRes.style.display="none";
  let html="";
  let lastDate="";
  let lastStage="";
  filtered.forEach(m=>{
    if(m.stage!==lastStage){
      const stageLabel=m.stage==="group"?"グループステージ":"ノックアウトステージ";
      html+=`<div class="stage-title">${stageLabel}</div>`;
      lastStage=m.stage;lastDate="";
    }
    if(m.date!==lastDate){
      html+=`<div class="date-head">${m.date}</div>`;
      lastDate=m.date;
    }
    const bBadges=m.broadcast.map(b=>`<span class="badge ${badgeClass(b)}">${b}</span>`).join("");
    const japanBadge=m.japan?`<span class="badge b-japan">日本戦</span>`:"";
    html+=`<div class="card ${m.japan?'japan':''}">
      <div class="row1">
        <span class="time">${m.time}</span>
        <span class="venue">${m.venue}</span>
      </div>
      <div class="teams">${m.home}<span class="vs">vs</span>${m.away}</div>
      <div class="badges">${japanBadge}${bBadges}</div>
    </div>`;
  });
  list.innerHTML=html;
}

document.getElementById("stageFilter").addEventListener("click",e=>{
  const btn=e.target.closest("button");
  if(!btn)return;
  document.querySelectorAll("#stageFilter button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  currentFilter=btn.dataset.stage;
  render();
});
document.getElementById("search").addEventListener("input",e=>{
  currentSearch=e.target.value;render();
});
render();
</script>
</body>
</html>
